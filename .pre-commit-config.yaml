ci:
  autoupdate_schedule: quarterly
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.8"
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint
        args: [--config=.sqlfluff]
        exclude: ^data/|^upgrade/
      - id: sqlfluff-fix
        args: [--config=.sqlfluff]
        exclude: ^data/|^upgrade/
